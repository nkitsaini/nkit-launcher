# This is a basic workflow to help you get started with Actions

name: Build APK

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "**", "!release" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
    - uses: actions/checkout@v4
    - uses: DeterminateSystems/nix-installer-action@main
    - uses: DeterminateSystems/magic-nix-cache-action@main
    - run: nix flake check
    - run: nix develop --command flutter pub get
    # Enable when test is written
    # - run: nix develop --command flutter test
    - run: nix develop --command flutter build apk --release --flavor prod

    - id: artifact
      name: Name APK artifact
      run: |
        version=$(sed -n 's/^version: *//p' pubspec.yaml)
        file_name="nkit-launcher-${version}.apk"
        mv build/app/outputs/flutter-apk/app-prod-release.apk "build/app/outputs/flutter-apk/${file_name}"
        echo "file_name=${file_name}" >> "$GITHUB_OUTPUT"
        echo "path=build/app/outputs/flutter-apk/${file_name}" >> "$GITHUB_OUTPUT"

    - name: Save APK to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.artifact.outputs.file_name }}
        path: ${{ steps.artifact.outputs.path }}
