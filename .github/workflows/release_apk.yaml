name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: nix flake check
      - run: nix develop --command flutter pub get
      - run: nix develop --command flutter analyze --no-pub
      - run: nix develop --command flutter build apk --release
      - id: artifact
        name: Name release artifact
        run: |
          version=$(sed -n 's/^version: *//p' pubspec.yaml)
          file_name="nkit-launcher-${version}.apk"
          mv build/app/outputs/flutter-apk/app-release.apk "build/app/outputs/flutter-apk/${file_name}"
          echo "file_name=${file_name}" >> "$GITHUB_OUTPUT"
          echo "path=build/app/outputs/flutter-apk/${file_name}" >> "$GITHUB_OUTPUT"
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ steps.artifact.outputs.path }}
      - name: Save APK to workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.file_name }}
          path: ${{ steps.artifact.outputs.path }}
